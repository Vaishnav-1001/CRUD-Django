<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Todo App</title>
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca; --bg-color: #f3f4f6;
            --card-bg: #ffffff; --text-main: #1f2937; --text-muted: #6b7280; --border: #e5e7eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: var(--card-bg); width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 1.5rem; color: var(--text-main); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.5rem; color: var(--text-muted); }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { display: block; width: 100%; padding: 0.75rem; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; margin-top: 0.5rem; }
        .btn:hover { background-color: var(--primary-hover); }
        .link-text { display: block; text-align: center; color: var(--primary); text-decoration: none; margin-top: 1rem; font-size: 0.875rem; }
        .link-text:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Register</h2>
        <form action="{% url 'register-page' %}" method="POST">
            {% csrf_token %}
            <div class="form-class" style=" display: flex; justify-content: center;">
              {% if messages %}
                {% for message in messages %}
                {% if message.tags == 'error' %}
                  <h5 style="color: red;">{{message}}</h5>
                {% else %}
                  <h5 style="color: green;">{{message}}</h5>
                {% endif %} 
                {% endfor %}
              {% endif %}
              <br>
              {% if reg_success %}
                <script>
                // Wait 3000 milliseconds (3 seconds), then redirect
                   setTimeout(function() {
                       window.location.href = "{% url 'login-page' %}"; 
                  }, 2000);
                </script>
              {% endif %}
            </div>
          <div class="form-group">
              <label>Username</label>
              <input type="text" placeholder="Choose a username" required name="username">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Enter yout Email id" required name="email">
          </div>
        
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create password" required name="password">
          </div>
        
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required name="confirmpassword">
          </div>     
        <button type="submit" class="btn">Sign Up</button>
        <a href="{% url 'login-page' %}" class="link-text">Already have an account? Login</a>
     </form>
    </div>

</body>
</html>
