<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Todo App</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .subtitle {
            text-align: center;
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            text-align: center;
            font-size: 1.25rem;
            letter-spacing: 0.25rem;
        }
        input:focus {
            border-color: var(--primary);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-top: 1.5rem;
        }
        .btn:hover {
            background-color: var(--primary-hover);
        }
        .link-text {
            display: block;
            text-align: center;
            color: var(--primary);
            text-decoration: none;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        .link-text:hover {
            text-decoration: underline;
        }
        .error-msg {
            color: red;
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Verify Email</h2>
        <p class="subtitle">We sent a 6-digit code to <br><strong>{{ email }}</strong></p>

        <form action="{% url 'verify_otp' %}" method="POST">
            {% csrf_token %}
            
            {% if messages %}
                {% for message in messages %}
                    <h5 class="error-msg">{{ message }}</h5> 
                {% endfor %}
            {% endif %}

            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" name="otp" required maxlength="6" pattern="\d{6}" placeholder="123456">
            </div>
            
            <button type="submit" class="btn">Verify & Register</button>
            <a href="{% url 'register-page' %}" class="link-text">Back to Registration</a>
        </form> 
    </div>

</body>
</html>
